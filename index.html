<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers 3D Clone</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 10;
        }

        #powerup-status {
            color: #FFD700;
            font-size: 18px;
            margin-top: 5px;
        }

        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #FFD700;
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        button {
            padding: 15px 30px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        button:disabled {
            background: #888;
            cursor: not-allowed;
        }

        #loading-text {
            margin-top: 15px;

            color: #aaa;
        }

        #pause-menu {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    display: none; /* Hidden by default */
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    z-index: 30;
}

#store-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 25;
        }

        .store-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>

<body>

    <div id="pause-menu">
    <h1>Paused</h1>
    <button id="resumeBtn">Resume</button>
    <button id="restartBtn" style="margin-top: 10px; background: #d9534f;">Restart</button>
</div>

    <div id="ui">
        Score: <span id="score">0</span><br>
        Coins: <span id="coins">0</span>
        <div id="powerup-status"></div>
    </div>

<div id="menu">
        <h1 id="menu-title">Subway Chase 3D</h1>
        <p id="menu-stats">A/D or Arrows to move | Space to Jump</p>
        <p style="font-size: 24px; font-weight: bold;">Bank: <span id="menu-total-coins" style="color:#FFD700;">0</span> Coins</p>
        <button id="startBtn" disabled>Loading Models...</button>
        <button id="storeBtn" style="margin-top: 10px; background: #9C27B0; display: none;">Open Store</button>
        <div id="loading-text">Downloading assets (0/5)</div>
    </div>

    <div id="store-menu">
        <h1>Skin Store</h1>
        <p>Your Coins: <span id="store-coins" style="color:#FFD700;">0</span></p>
        
        <div class="store-grid">
            <button id="btn-skin-black" style="background: #333;">Buy Black (10)</button>
            <button id="btn-skin-green" style="background: #28a745;">Buy Green (20)</button>
            <button id="btn-skin-yellow" style="background: #ffc107; color: black;">Buy Yellow (30)</button>
            <button id="btn-skin-red" style="background: #dc3545;">Buy Red (40)</button>
            <button id="btn-skin-blue" style="background: #007bff;">Buy Blue (50)</button>
        </div>
        
        <button id="closeStoreBtn" style="margin-top: 30px; background: #6c757d;">Back to Menu</button>
    </div>

    <script>
        let isPaused = false;
        let totalCoins = 0;
        let unlockedSkins = { black: false, green: false, yellow: false, red: false, blue: false };
        let scene, camera, renderer;
        let player, cop;
        let worldObjects = [];
        let gameActive = false;

        let score = 0, coinCount = 0, speed = 0.4, distance = 0;
        let currentLane = 0; const laneWidth = 3; let targetX = 0;
        let velocityY = 0; const gravity = -0.015; let isJumping = false;
        let jumpStrength = 0.3; let baseJumpStrength = 0.3;
        let isRolling = false; 
        let rollTimer = 0;
        let flyMode = false; let flyTimer = 0; let jumpBoostTimer = 0;
        let lives = 3; const maxLives = 3;
        let shakeTimer = 0; let lifeRegenTimer = 0;

        let audioCtx; let musicInterval;

        // --- ENVIRONMENT VARIABLES ---
// --- ENVIRONMENT VARIABLES ---
        let buildings = [];
        const buildingGeom = new THREE.BoxGeometry(1, 1, 1);
        let texturedBuildingMaterials = []; // We will fill this with textured materials
        let asphaltMaterial, grassMaterial; // Materials for the ground

        // --- MODEL LOADING & ANIMATIONS ---
        const loadedModels = {};
        const animationMixers = [];
        let playerMixer = null;
        let playerActions = {}; 
        let activePlayerAction = null;

        const clock = new THREE.Clock();

        const assetsToLoad = [
{ name: 'jake', url: 'https://raw.githubusercontent.com/kubmakk/subway/main/src/jake_subway_surfers_real.glb', height: 2 },
            { name: 'cop', url: 'https://raw.githubusercontent.com/kubmakk/subway/main/src/inspector_subway_surfers.glb', height: 2.2 },
            { name: 'train', url: 'https://raw.githubusercontent.com/kubmakk/subway/main/src/subway_surfers_train.glb', height: 3.5, rotY: Math.PI },
            { name: 'hoverboard', url: 'https://raw.githubusercontent.com/kubmakk/subway/main/src/scifi_jetpack.glb', height: 1.0 },
            { name: 'coin', url: 'https://raw.githubusercontent.com/kubmakk/subway/main/src/subway_surfers_coin.glb', height: 1.0 },
            { name: 'bootsJump', url: 'https://raw.githubusercontent.com/kubmakk/subway/main/src/air_jordan_1.glb', height: 1.0 },
            { name: 'obstacles', url: 'https://raw.githubusercontent.com/kubmakk/subway/main/src/sanstitre.glb', height: 1.0, rotY: Math.PI / 2 },
            { name: 'fencing', url: 'https://raw.githubusercontent.com/kubmakk/subway/main/src/fencing.glb', height: 1.0 }
        ];

        let modelsLoadedCount = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            // Updated Fog values for smoother distant building pop-ins
            scene.fog = new THREE.Fog(0x87CEEB, 40, 200);

            // Increased far clipping plane to 300 to render distant background objects
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 300);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 1, -10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(-10, 20, 10);
            dirLight.castShadow = true;
            scene.add(dirLight);

// --- TEXTURE LOADING & GROUND SETUP ---
            const textureLoader = new THREE.TextureLoader();

            // Load House Textures and create their materials
            const houseUrls = [
                'https://raw.githubusercontent.com/kubmakk/subway/main/src/house.jpg',
                'https://raw.githubusercontent.com/kubmakk/subway/main/src/house1.jpg',
                'https://raw.githubusercontent.com/kubmakk/subway/main/src/house2.jpg'
            ];
            houseUrls.forEach(url => {
                textureLoader.load(url, (texture) => {
                    texturedBuildingMaterials.push(new THREE.MeshLambertMaterial({ map: texture }));
                });
            });

            // Load Asphalt Texture
            textureLoader.load('https://raw.githubusercontent.com/kubmakk/subway/main/src/asphalt.jpg', (texture) => {
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(5, 100); // Repeat texture 5 times width-wise, 100 times length-wise
                asphaltMaterial = new THREE.MeshPhongMaterial({ map: texture });

                const track = new THREE.Mesh(new THREE.PlaneGeometry(15, 300), asphaltMaterial);
                track.rotation.x = -Math.PI / 2;
                track.position.z = -50;
                track.receiveShadow = true;
                scene.add(track);
            });

            // Load Grass Texture
            textureLoader.load('https://raw.githubusercontent.com/kubmakk/subway/main/src/grass.jpg', (texture) => {
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(30, 100); // Repeat grass texture more to look natural
                grassMaterial = new THREE.MeshPhongMaterial({ map: texture });
                
                const grassLeft = new THREE.Mesh(new THREE.PlaneGeometry(100, 300), grassMaterial);
                grassLeft.rotation.x = -Math.PI / 2;
                grassLeft.position.set(-57.5, -0.05, -50);
                grassLeft.receiveShadow = true;
                scene.add(grassLeft);
                
                const grassRight = new THREE.Mesh(new THREE.PlaneGeometry(100, 300), grassMaterial);
                grassRight.rotation.x = -Math.PI / 2;
                grassRight.position.set(57.5, -0.05, -50);
                grassRight.receiveShadow = true;
                scene.add(grassRight);
            });

            // White Lane Dividers
            for (let i = -1; i <= 1; i += 2) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 300), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                line.rotation.x = -Math.PI / 2;
                line.position.set(i * 1.5, 0.01, -50);
                scene.add(line);
            }

            document.getElementById('resumeBtn').addEventListener('click', togglePause);
document.getElementById('restartBtn').addEventListener('click', () => {
    togglePause(); 
    resetGame();
    playPlayerAnimation('run');
});

document.getElementById('storeBtn').addEventListener('click', openStore);
            document.getElementById('closeStoreBtn').addEventListener('click', closeStore);
            
            // Note: 0x333333 is used for black so you can still see 3D shadows.
            document.getElementById('btn-skin-black').addEventListener('click', () => handleSkinClick('black', 10, 0x333333, 'btn-skin-black'));
            document.getElementById('btn-skin-green').addEventListener('click', () => handleSkinClick('green', 20, 0x00ff00, 'btn-skin-green'));
            document.getElementById('btn-skin-yellow').addEventListener('click', () => handleSkinClick('yellow', 30, 0xffff00, 'btn-skin-yellow'));
            document.getElementById('btn-skin-red').addEventListener('click', () => handleSkinClick('red', 40, 0xff0000, 'btn-skin-red'));
            document.getElementById('btn-skin-blue').addEventListener('click', () => handleSkinClick('blue', 50, 0x0000ff, 'btn-skin-blue'));

            // Spawn initial procedural city landscape for the background
            initBuildings();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', onKeyDown);
            document.getElementById('startBtn').addEventListener('click', startGame);

            loadModels();
            animate();
        }

        function togglePause() {
    if (!gameActive) return; // Only pause if the game is actually running
    
    isPaused = !isPaused;
    document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none';
}
        // --- CITY ENVIRONMENT FUNCTIONS ---
        function initBuildings() {
            buildings.forEach(b => scene.remove(b));
            buildings = [];
            // Spawn buildings far into the horizon so there's no empty void
            for (let z = 30; z >= -200; z -= 20) {
                spawnBuildingRow(z);
            }
        }

        function spawnBuildingRow(z) {
            // Left side city blocks
            createBuilding(-12 - Math.random() * 5, z, true);
            createBuilding(-25 - Math.random() * 10, z - Math.random() * 10, false);

            // Right side city blocks
            createBuilding(12 + Math.random() * 5, z, true);
            createBuilding(25 + Math.random() * 10, z - Math.random() * 10, false);
        }

        function createBuilding(x, z, isFrontRow) {
            if (texturedBuildingMaterials.length === 0) return; // Don't crash if textures aren't loaded yet
            const mat = texturedBuildingMaterials[Math.floor(Math.random() * texturedBuildingMaterials.length)];
            const mesh = new THREE.Mesh(buildingGeom, mat);
            
            const width = 6 + Math.random() * 6;
            // Front row buildings are slightly shorter than background ones
            const height = isFrontRow ? (10 + Math.random() * 15) : (25 + Math.random() * 30);
            const depth = 6 + Math.random() * 6;
            
            mesh.scale.set(width, height, depth);
            mesh.position.set(x, height / 2, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            scene.add(mesh);
            buildings.push(mesh);
        }

        function loadModels() {
            const loader = new THREE.GLTFLoader();

            assetsToLoad.forEach(asset => {
                loader.load(asset.url, (gltf) => {
                    let model = gltf.scene;

                    model.traverse(function (child) {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            child.frustumCulled = false;
                            if (child.material) {
                                child.material.side = THREE.DoubleSide;
                                 child.material.transparent = false; // Forces it to be solid
                                 child.material.depthWrite = true;   // Fixes weird see-through overlaps
                            }
                        }
                    });

                    if (asset.customScale) {
                        model.scale.set(asset.customScale, asset.customScale, asset.customScale);
                    } else {
                        const box = new THREE.Box3().setFromObject(model);
                        const size = box.getSize(new THREE.Vector3());
                        if (size.y > 0) {
                            const scaleFactor = asset.height / size.y;
                            model.scale.set(scaleFactor, scaleFactor, scaleFactor);
                        }
                    }

                    if (asset.rotY) model.rotation.y = asset.rotY;
                    if (asset.yOffset) model.position.y = asset.yOffset;

                    const centeredBox = new THREE.Box3().setFromObject(model);
                    const center = centeredBox.getCenter(new THREE.Vector3());
                    const bottomY = centeredBox.min.y;
                    model.children.forEach(child => {
                        child.position.x -= center.x;
                        child.position.y -= bottomY;
                        child.position.z -= center.z;
                    });

                    loadedModels[asset.name] = model;

                    if (gltf.animations && gltf.animations.length > 0) {
                        model.userData.animations = gltf.animations;
                    }

                    modelsLoadedCount++;
                    document.getElementById('loading-text').innerText = `Downloading assets (${modelsLoadedCount}/${assetsToLoad.length})`;

                    if (modelsLoadedCount === assetsToLoad.length) {
                        onAllModelsLoaded();
                    }
                }, undefined, (error) => {
                    console.error(`Failed to load ${asset.url}:`, error);
                    document.getElementById('loading-text').innerText = `Error loading ${asset.name}. Check F12 Console.`;
                });
            });
        }

        function onAllModelsLoaded() {
            document.getElementById('startBtn').innerText = "Start Game";
            document.getElementById('startBtn').disabled = false;
            document.getElementById('loading-text').style.display = 'none';
            document.getElementById('storeBtn').style.display = 'block';

            player = loadedModels['jake'].clone();
            scene.add(player);
            player.rotation.y = Math.PI; 

            setupPlayerAnimations(player);

            cop = loadedModels['cop'].clone();
            scene.add(cop);
            cop.rotation.y = Math.PI; 

            if (cop.userData.animations) {
                const m = new THREE.AnimationMixer(cop);
                m.clipAction(cop.userData.animations[0]).play();
                animationMixers.push(m);
            }
        }

        function setupPlayerAnimations(model) {
            if (loadedModels['jake'].userData.animations) {
                const anims = loadedModels['jake'].userData.animations;
                playerMixer = new THREE.AnimationMixer(model);
                anims.forEach(clip => {
                    playerActions[clip.name.toLowerCase()] = playerMixer.clipAction(clip);
                });
                activePlayerAction = playerMixer.clipAction(anims[0]);
                activePlayerAction.play();
                animationMixers.push(playerMixer);
            }
        }

        function playPlayerAnimation(nameKeyword) {
            if (!playerMixer) return; 
            let newAction = null;
            for (const [name, action] of Object.entries(playerActions)) {
                if (name.includes(nameKeyword)) newAction = action;
            }
            if (newAction && newAction !== activePlayerAction) {
                if (activePlayerAction) activePlayerAction.fadeOut(0.2);
                newAction.reset().fadeIn(0.2).play();
                activePlayerAction = newAction;
            }
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            resetGame();
            initAudio();
            gameActive = true;
            playPlayerAnimation('run'); 
        }

        function resetGame() {
            worldObjects.forEach(obj => scene.remove(obj.mesh));
            worldObjects = [];
            score = 0; coinCount = 0; speed = 0.2; distance = 0; currentLane = 0; targetX = 0;
            player.position.set(0, 0, 0);
            cop.position.set(0, 0, 6);
            velocityY = 0; flyMode = false; flyTimer = 0; jumpBoostTimer = 0; jumpStrength = 0.3;
            lives = maxLives; shakeTimer = 0; lifeRegenTimer = 0;
            camera.position.set(0, 5, 10); // Ensures camera isn't stuck shaking if you restart quickly
            updateUI();
        }

        function spawnRow() {
            const spawnZ = -120; // Pushed spawn slightly further back to avoid seeing obstacles pop in early
            let emptyLane = Math.floor(Math.random() * 3) - 1;

            for (let lane = -1; lane <= 1; lane++) {
                const xPos = lane * laneWidth;
                if (lane === emptyLane) {
                    if (Math.random() > 0.3) spawnItem(xPos, spawnZ, 'coin');
                    continue;
                }
                const rand = Math.random();
                if (rand < 0.2) spawnObstacle(xPos, spawnZ, 'train'); // 20% chance for a Train
                else if (rand < 0.4) spawnObstacle(xPos, spawnZ, 'obstacles'); // 20% chance for a Jumpable Barrier
                else if (rand < 0.7) spawnItem(xPos, spawnZ, 'coin');
                else if (rand < 0.75) spawnItem(xPos, spawnZ, 'jump');
                else if (rand < 0.8) spawnItem(xPos, spawnZ, 'hoverboard');
            }
        }

function spawnObstacle(x, z, type) {
            let mesh = loadedModels[type].clone(); 
            
            // By default, the obstacle goes exactly in the center of the lane
            let finalX = x; 
            
            // If it's the barrier, nudge it to the left to fix the off-center model
            if (type === 'obstacles') {
                finalX = x - 0.8; // Change this number if you need to fine-tune it! (- moves left, + moves right)
            }
            
            mesh.position.set(finalX, 0, z); 
            scene.add(mesh);
            worldObjects.push({ mesh: mesh, type: 'obstacle', obstacleType: type });
        }

        function spawnItem(x, z, type) {
            let mesh;
            let yPos = 1.2; 

            if (type === 'coin') {
                mesh = loadedModels['coin'].clone();
                yPos = 2.2;
            } else if (type === 'hoverboard') {
                mesh = loadedModels['hoverboard'].clone();
                yPos = 1.5; 
            } else if (type === 'jump') {
                mesh = loadedModels['bootsJump'].clone();
                yPos = 1.0; 
            } else if (type === 'obstacles') {
                mesh = loadedModels['obstacles'].clone();
                yPos = 1.0; 
            }

            mesh.position.set(x, yPos, z);
            scene.add(mesh);
            worldObjects.push({ mesh: mesh, type: type });
        }

        function updatePhysics() {
            player.position.x += (targetX - player.position.x) * 0.15;
            cop.position.x += (player.position.x - cop.position.x) * 0.05;

            if (!playerMixer && !isJumping && !flyMode) {
                player.rotation.z = Math.sin(Date.now() * 0.01) * 0.1; 
                player.position.y = Math.abs(Math.sin(Date.now() * 0.015)) * 0.2; 
            } else {
                player.rotation.z = 0; 
            }

            if (flyMode) {
                player.position.y += (4 - player.position.y) * 0.1;
                flyTimer--;
                if (flyTimer <= 0) {
                    flyMode = false;
                    playPlayerAnimation('run'); 
                }
            } else {
                velocityY += gravity;
                player.position.y += velocityY;
                if (player.position.y <= 0) {
                    player.position.y = 0;
                    velocityY = 0;
                    if (isJumping) {
                        isJumping = false;
                        playPlayerAnimation('run'); 
                    }
                }
            }

            if (jumpBoostTimer > 0) {
                jumpBoostTimer--;
                if (jumpBoostTimer <= 0) jumpStrength = baseJumpStrength;
            } // Roll Timer and visual squish effect
            if (isRolling) {
                rollTimer--;
                player.scale.y = player.scale.x * 0.5; // Squish the character down
                
                if (rollTimer <= 0) {
                    isRolling = false;
                    player.scale.y = player.scale.x; // Stand back up to normal height
                    if (!isJumping) {
                        playPlayerAnimation('run');
                    }
                }
            }

            // Camera Shake Effect
    if (shakeTimer > 0) {
        shakeTimer--;
        camera.position.x = (Math.random() - 0.5) * 0.8;
        camera.position.y = 5 + (Math.random() - 0.5) * 0.8;
    } else {
        camera.position.x = 0;
        camera.position.y = 5;
    }

    // Life Regeneration (Recovers 1 life every ~10 seconds)
    if (lives < maxLives) {
        lifeRegenTimer++;
        if (lifeRegenTimer >= 600) { 
            lives++;
            lifeRegenTimer = 0;
            playBeep(600, 'sine', 0.1); // Subtle chime when a life regenerates
        }
    }
        }

function updateWorld() {
            // --- PERFECT SCROLL GROUND TEXTURES ---
            if (asphaltMaterial && asphaltMaterial.map) {
                // Reversed to += and changed to exact ratio (100 repeats / 300 length)
                asphaltMaterial.map.offset.y += speed * 0.3333;
            }
            if (grassMaterial && grassMaterial.map) {
                grassMaterial.map.offset.y += speed * 0.3333;
            }

            // ... the rest of the function continues below
            // --- END SCROLL ---
            
            distance += speed;
            score = Math.floor(distance / 10);
            speed += 0.00003;

            // Spawn Obstacles & City Buildings as we move forward
            if (distance % 20 < speed) {
                spawnRow();
                spawnBuildingRow(-200); // Spawns distant scenery matching player speed
            }

            // Move procedural buildings
            for (let i = buildings.length - 1; i >= 0; i--) {
                let b = buildings[i];
                b.position.z += speed;
                // Delete buildings once they pass safely behind the camera
                if (b.position.z > 30) {
                    scene.remove(b);
                    buildings.splice(i, 1);
                }
            }

            const playerBox = new THREE.Box3().setFromObject(player);
            playerBox.expandByScalar(-0.3); 
            // Shave off the top of the hitbox if rolling so we pass under fences
            if (isRolling) {
                playerBox.max.y -= 1.0; 
            }

            for (let i = worldObjects.length - 1; i >= 0; i--) {
                let obj = worldObjects[i];
                obj.mesh.position.z += speed;

                if (obj.type === 'coin' || obj.type === 'jump') {
                    obj.mesh.rotation.y += 0.05;
                } else if (obj.type === 'hoverboard') {
                    obj.mesh.rotation.y += 0.02;
                    obj.mesh.position.y = 1 + Math.sin(Date.now() * 0.005) * 0.2; 
                }

const objBox = new THREE.Box3().setFromObject(obj.mesh);
if (obj.type === 'obstacle') {
    if (obj.obstacleType === 'train') {
        objBox.expandByScalar(-0.4); // Trains get a forgiving hitbox
    } else {
        objBox.expandByScalar(-0.1); // Barriers shrink slightly so their hitbox doesn't disappear!
    }
}

if (playerBox.intersectsBox(objBox)) {
            if (obj.type === 'obstacle') {
                if (!flyMode) {
                    lives--;
                    shakeTimer = 20; // 20 frames of screen shake
                    playBeep(150, 'sawtooth', 0.2); // "Oof" crash sound
                    removeObject(i); // Break the obstacle so it doesn't double-hit you
                    
                    if (lives <= 0) {
                        gameOver(); // Only die if lives hit 0
                    }
                }
            } else if (obj.type === 'coin') {
                        coinCount++;
                        playBeep(600, 'sine');
                        removeObject(i);
                    } else if (obj.type === 'jump') {
                        jumpStrength = 0.5;
                        jumpBoostTimer = 600;
                        playBeep(800, 'square');
                        removeObject(i);
                    } else if (obj.type === 'hoverboard') {
                        flyMode = true;
                        flyTimer = 400;
                        velocityY = 0;
                        playBeep(1000, 'triangle');
                        playPlayerAnimation('fly'); 
                        removeObject(i);
                    }
                } else if (obj.mesh.position.z > 15) {
                    removeObject(i);
                }
            }

            updateUI();
        }

        function removeObject(index) {
            scene.remove(worldObjects[index].mesh);
            worldObjects.splice(index, 1);
        }

function gameOver() {
            gameActive = false;
            stopMusic();
            playBeep(200, 'sawtooth', 1);
            playPlayerAnimation('die'); 
            
            // Add run coins to total bank
            totalCoins += coinCount;
            
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('menu-title').innerText = "Busted!";
            document.getElementById('menu-stats').innerHTML = `Final Score: ${score}<br>Run Coins: ${coinCount}`;
            document.getElementById('menu-total-coins').innerText = totalCoins;
            document.getElementById('startBtn').innerText = "Play Again";
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('coins').innerText = coinCount;
            let status = `Lives: ${lives} | `;
            if (flyMode) status += "HOVERBOARD ACTIVE! ";
            if (jumpBoostTimer > 0) status += "JUMP BOOST! ";
            document.getElementById('powerup-status').innerText = status;
        }

        function onKeyDown(event) {
            if (!gameActive) return;
            if (event.code === 'Escape') {
    togglePause();
    return;
} 
if (!gameActive || isPaused) return;
            if ((event.code === 'ArrowLeft' || event.code === 'KeyA') && currentLane > -1) {
                currentLane--; targetX = currentLane * laneWidth;
            } else if ((event.code === 'ArrowRight' || event.code === 'KeyD') && currentLane < 1) {
                currentLane++; targetX = currentLane * laneWidth;
            } else if (event.code === 'Space') {
                if (!isJumping && !flyMode) {
                    velocityY = jumpStrength;
                    isJumping = true;
                    playBeep(400, 'sine', 0.1);
                    playPlayerAnimation('jump'); 
                }
            } else if (event.code === 'ArrowDown' || event.code === 'KeyS') {
                if (!flyMode) {
                    if (isJumping) {
                        velocityY = -0.5; // Fast-fall to the ground instantly
                    }
                    isRolling = true;
                    rollTimer = 40; // Roll lasts for 40 frames
                }
            }

            
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

if (gameActive && !isPaused) {
    animationMixers.forEach(mixer => mixer.update(delta));
    updatePhysics();
    updateWorld();
}
            renderer.render(scene, camera);
        }

        // --- AUDIO ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            startMusic();
        }

        function playBeep(freq, type, duration = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function startMusic() {
            stopMusic();
            let step = 0;
            musicInterval = setInterval(() => {
                if (!gameActive) return;
                if (step % 4 === 0) playBeep(60, 'sine', 0.2);
                else if (step % 4 === 2) playBeep(120, 'triangle', 0.1);
                step++;
            }, 200);
        }

        function stopMusic() { if (musicInterval) clearInterval(musicInterval); }
function openStore() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('store-menu').style.display = 'flex';
            document.getElementById('store-coins').innerText = totalCoins;
        }

        function closeStore() {
            document.getElementById('store-menu').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('menu-total-coins').innerText = totalCoins;
        }

        function handleSkinClick(skin, price, colorHex, btnId) {
            if (unlockedSkins[skin]) {
                equipSkin(colorHex);
                alert("Equipped " + skin + " skin!");
            } else {
                if (totalCoins >= price) {
                    totalCoins -= price;
                    unlockedSkins[skin] = true;
                    equipSkin(colorHex);
                    document.getElementById('store-coins').innerText = totalCoins;
                    document.getElementById(btnId).innerText = "Equip " + skin.charAt(0).toUpperCase() + skin.slice(1);
                    alert("Bought and equipped " + skin + " skin!");
                } else {
                    alert("Not enough coins! You need " + price);
                }
            }
        }

        function equipSkin(colorHex) {
            if (!player) return;
            player.traverse(function(child) {
                if (child.isMesh && child.material) {
                    // Tinting the material color
                    if (Array.isArray(child.material)) {
                        child.material.forEach(mat => mat.color.setHex(colorHex));
                    } else {
                        child.material.color.setHex(colorHex);
                    }
                }
            });
        }

        init();
    </script>
</body>

</html>
