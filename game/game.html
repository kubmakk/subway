<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers 3D Clone</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #87CEEB; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 10; }
        #powerup-status { color: #FFD700; font-size: 18px; margin-top: 5px; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 20; }
        h1 { font-size: 48px; margin-bottom: 10px; color: #FFD700; }
        p { font-size: 20px; margin-bottom: 30px; text-align: center; }
        button { padding: 15px 30px; font-size: 24px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #45a049; }
        button:disabled { background: #888; cursor: not-allowed; }
        #loading-text { margin-top: 15px; font-size: 18px; color: #aaa; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="ui">
        Score: <span id="score">0</span><br>
        Coins: <span id="coins">0</span>
        <div id="powerup-status"></div>
    </div>

    <div id="menu">
        <h1>Subway Chase 3D</h1>
        <p>A/D or Arrows to move | Space to Jump</p>
        <button id="startBtn" disabled>Loading Models...</button>
        <div id="loading-text">Downloading assets (0/5)</div>
    </div>

<script>
    let scene, camera, renderer;
    let player, cop;
    let worldObjects = [];
    let gameActive = false;
    
    let score = 0, coinCount = 0, speed = 0.4, distance = 0;
    let currentLane = 0; const laneWidth = 3; let targetX = 0;
    let velocityY = 0; const gravity = -0.015; let isJumping = false;
    let jumpStrength = 0.3; let baseJumpStrength = 0.3;
    let flyMode = false; let flyTimer = 0; let jumpBoostTimer = 0;

    let audioCtx; let musicInterval;

    // --- MODEL LOADING & ANIMATIONS ---
    const loadedModels = {};
    const animationMixers = []; 
    let playerMixer = null; 
    let playerActions = {}; // Stores Jake's built-in animations if he has them
    let activePlayerAction = null;

    const clock = new THREE.Clock();

    // NOTE: You can tweak "customScale", "rotY", and "yOffset" here if a model looks wrong!
    const assetsToLoad = [
        // ИЗМЕНЕНО: Добавлен поворот на 180 градусов (Math.PI), чтобы раннер смотрел вдаль
        // ИЗМЕНЕНИЕ 1: Убираем поворот отсюда
        { name: 'jake', url: 'https://github.com/kepth02xzn1-cloud/subway/blob/main/inspector_subway_surfers.glb', height: 2 },
        
        { name: 'cop', url: 'https://github.com/kepth02xzn1-cloud/subway/blob/main/inspector_subway_surfers.glb', height: 2.2 },
        
        // ИЗМЕНЕНО: Поворот изменен на 180 градусов (Math.PI), чтобы поезд смотрел вдаль
        { name: 'train', url: 'https://github.com/kepth02xzn1-cloud/subway/blob/main/subway_surfers_train.glb', height: 3.5, rotY: Math.PI /*, customScale: 0.1*/ },
        
        { name: 'hoverboard', url: 'https://github.com/kepth02xzn1-cloud/subway/blob/main/scifi_jetpack.glb', height: 1.0 },
        { name: 'coin', url: 'https://github.com/kepth02xzn1-cloud/subway/blob/main/subway_surfers_coin.glb', height: 1.0 },
        {name: 'bootsJump', url: 'https://github.com/kepth02xzn1-cloud/subway/blob/main/air_jordan_1.glb', height: 1.0}
    ];

    let modelsLoadedCount = 0;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 80);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 1, -10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(-10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Ground setup
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 200), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.z = -40;
        ground.receiveShadow = true;
        scene.add(ground);

        for(let i=-1; i<=1; i+=2) {
            const line = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 200), new THREE.MeshBasicMaterial({color: 0xffffff}));
            line.rotation.x = -Math.PI / 2;
            line.position.set(i * 1.5, 0.01, -40);
            scene.add(line);
        }

        window.addEventListener('resize', onWindowResize);
        window.addEventListener('keydown', onKeyDown);
        document.getElementById('startBtn').addEventListener('click', startGame);

        loadModels();
        animate();
    }

    function loadModels() {
        const loader = new THREE.GLTFLoader();
        
        assetsToLoad.forEach(asset => {
            loader.load(asset.url, (gltf) => {
                let model = gltf.scene;
                
                // 1. Force fix materials & visibility (Fixes invisible trains)
                model.traverse(function(child) {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        child.frustumCulled = false; // Never hide this model
                        if (child.material) {
                            child.material.side = THREE.DoubleSide; // Fixes missing faces
                        }
                    }
                });

                // 2. Scale & Position the model
                if (asset.customScale) {
                    model.scale.set(asset.customScale, asset.customScale, asset.customScale);
                } else {
                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    if (size.y > 0) {
                        const scaleFactor = asset.height / size.y;
                        model.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    }
                }

                if (asset.rotY) model.rotation.y = asset.rotY;
                if (asset.yOffset) model.position.y = asset.yOffset;

                // Center pivot to bottom
                const centeredBox = new THREE.Box3().setFromObject(model);
                const center = centeredBox.getCenter(new THREE.Vector3());
                const bottomY = centeredBox.min.y;
                model.children.forEach(child => {
                    child.position.x -= center.x;
                    child.position.y -= bottomY;
                    child.position.z -= center.z;
                });

                loadedModels[asset.name] = model;

                // 3. Extract built-in Animations
                if (gltf.animations && gltf.animations.length > 0) {
                    model.userData.animations = gltf.animations;
                }

                modelsLoadedCount++;
                document.getElementById('loading-text').innerText = `Downloading assets (${modelsLoadedCount}/${assetsToLoad.length})`;

                if (modelsLoadedCount === assetsToLoad.length) {
                    onAllModelsLoaded();
                }
            }, undefined, (error) => {
                console.error(`Failed to load ${asset.url}:`, error);
                document.getElementById('loading-text').innerText = `Error loading ${asset.name}. Check F12 Console.`;
            });
        });
    }

function onAllModelsLoaded() {
    document.getElementById('startBtn').innerText = "Start Game";
    document.getElementById('startBtn').disabled = false;
    document.getElementById('loading-text').style.display = 'none';

    // Setup Player (Jake)
    player = loadedModels['jake'].clone();
    scene.add(player);
    player.rotation.y = Math.PI; // Раннер уже развернут

    setupPlayerAnimations(player);

    // Setup Cop (Охранник)
    cop = loadedModels['cop'].clone();
    scene.add(cop);
    
    // ДОБАВЬТЕ ЭТУ СТРОКУ НИЖЕ:
    cop.rotation.y = Math.PI; // Теперь охранник тоже смотрит вдаль

    if (cop.userData.animations) {
        const m = new THREE.AnimationMixer(cop);
        m.clipAction(cop.userData.animations[0]).play();
        animationMixers.push(m);
    }
}

    // --- ANIMATION SYSTEM ---
    function setupPlayerAnimations(model) {
        if (loadedModels['jake'].userData.animations) {
            const anims = loadedModels['jake'].userData.animations;
            
            // This logs the names of animations so you can see them! (Press F12 to view)
            console.log("Jake's available animations found:", anims.map(a => a.name));

            playerMixer = new THREE.AnimationMixer(model);
            anims.forEach(clip => {
                playerActions[clip.name.toLowerCase()] = playerMixer.clipAction(clip);
            });

            // Start the first animation by default
            activePlayerAction = playerMixer.clipAction(anims[0]);
            activePlayerAction.play();
            animationMixers.push(playerMixer);
        } else {
            console.warn("Jake has no built-in animations. Using code-based procedural animations.");
        }
    }

    // Call this to change animation (e.g., playPlayerAnimation('jump'))
    function playPlayerAnimation(nameKeyword) {
        if (!playerMixer) return; // Model has no animations
        
        let newAction = null;
        // Search for an animation that contains the keyword (e.g., "run", "jump")
        for (const [name, action] of Object.entries(playerActions)) {
            if (name.includes(nameKeyword)) newAction = action;
        }

        if (newAction && newAction !== activePlayerAction) {
            if (activePlayerAction) activePlayerAction.fadeOut(0.2);
            newAction.reset().fadeIn(0.2).play();
            activePlayerAction = newAction;
        }
    }

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        resetGame();
        initAudio();
        gameActive = true;
        playPlayerAnimation('run'); // Try to play 'run' animation
    }

    function resetGame() {
        worldObjects.forEach(obj => scene.remove(obj.mesh));
        worldObjects = [];
        score = 0; coinCount = 0; speed = 0.4; distance = 0; currentLane = 0; targetX = 0;
        player.position.set(0, 0, 0);
        cop.position.set(0, 0, 6);
        velocityY = 0; flyMode = false; flyTimer = 0; jumpBoostTimer = 0;
        updateUI();
    }

    function spawnRow() {
        const spawnZ = -80;
        let emptyLane = Math.floor(Math.random() * 3) - 1; 

        for (let lane = -1; lane <= 1; lane++) {
            const xPos = lane * laneWidth;
            if (lane === emptyLane) {
                if (Math.random() > 0.3) spawnItem(xPos, spawnZ, 'coin');
                continue;
            }
            const rand = Math.random();
            if (rand < 0.4) spawnObstacle(xPos, spawnZ, 'train');
            else if (rand < 0.7) spawnItem(xPos, spawnZ, 'coin');
            else if (rand < 0.75) spawnItem(xPos, spawnZ, 'jump'); 
            else if (rand < 0.8) spawnItem(xPos, spawnZ, 'hoverboard'); 
        }
    }

    function spawnObstacle(x, z, type) {
        let mesh = loadedModels['train'].clone();
        mesh.position.set(x, 0, z);
        scene.add(mesh);
        worldObjects.push({ mesh: mesh, type: 'obstacle' });
    }
    
function spawnItem(x, z, type) {
    let mesh;
    let yPos = 1.2; // Базовая высота для большинства предметов

    if (type === 'coin') {
        mesh = loadedModels['coin'].clone();
        yPos = 2.2;
    } else if (type === 'hoverboard') {
        mesh = loadedModels['hoverboard'].clone();
        yPos = 1.5; // Джетпак чуть выше
    } else if (type === 'jump') {
        // ИСПРАВЛЕНО: Теперь берем модель кроссовок
        mesh = loadedModels['bootsJump'].clone();
        yPos = 1.0; // Кроссовки ближе к земле
    }
    
    mesh.position.set(x, yPos, z); 
    scene.add(mesh);
    worldObjects.push({ mesh: mesh, type: type });
}

    function updatePhysics() {
        // Smooth lane switching
        player.position.x += (targetX - player.position.x) * 0.15;
        cop.position.x += (player.position.x - cop.position.x) * 0.05;

        // Procedural Animation: If Jake has no built-in animations, make him "bobble" so he looks like he's running
        if (!playerMixer && !isJumping && !flyMode) {
            player.rotation.z = Math.sin(Date.now() * 0.01) * 0.1; // wiggle
            player.position.y = Math.abs(Math.sin(Date.now() * 0.015)) * 0.2; // bob up and down
        } else {
            player.rotation.z = 0; // reset wiggle
        }

        if (flyMode) {
            player.position.y += (4 - player.position.y) * 0.1;
            flyTimer--;
            if (flyTimer <= 0) {
                flyMode = false;
                playPlayerAnimation('run'); // Switch back to run
            }
        } else {
            // Gravity
            velocityY += gravity;
            player.position.y += velocityY;
            if (player.position.y <= 0) {
                player.position.y = 0;
                velocityY = 0;
                if (isJumping) {
                    isJumping = false;
                    playPlayerAnimation('run'); // Landed, switch back to run
                }
            }
        }

        if (jumpBoostTimer > 0) {
            jumpBoostTimer--;
            if (jumpBoostTimer <= 0) jumpStrength = baseJumpStrength;
        }
    }

    function updateWorld() {
        distance += speed;
        score = Math.floor(distance / 10);
        speed += 0.0001;

        if (distance % 20 < speed) spawnRow();

        const playerBox = new THREE.Box3().setFromObject(player);
        playerBox.expandByScalar(-0.3); // Forgiving hitboxes

        for (let i = worldObjects.length - 1; i >= 0; i--) {
            let obj = worldObjects[i];
            obj.mesh.position.z += speed;

            // Procedural Item Animations (Spinning)
            if (obj.type === 'coin' || obj.type === 'jump') {
                obj.mesh.rotation.y += 0.05;
            } else if (obj.type === 'hoverboard') {
                obj.mesh.rotation.y += 0.02;
                obj.mesh.position.y = 1 + Math.sin(Date.now() * 0.005) * 0.2; // float
            }

            const objBox = new THREE.Box3().setFromObject(obj.mesh);
            if (obj.type === 'obstacle') objBox.expandByScalar(-0.4); 

            if (playerBox.intersectsBox(objBox)) {
                if (obj.type === 'obstacle') {
                    if (!flyMode) gameOver();
                } else if (obj.type === 'coin') {
                    coinCount++;
                    playBeep(600, 'sine');
                    removeObject(i);
                } else if (obj.type === 'jump') {
                    jumpStrength = 0.5;
                    jumpBoostTimer = 600; 
                    playBeep(800, 'square');
                    removeObject(i);
                } else if (obj.type === 'hoverboard') {
                    flyMode = true;
                    flyTimer = 400;
                    velocityY = 0;
                    playBeep(1000, 'triangle');
                    playPlayerAnimation('fly'); // Try to play fly/hover animation
                    removeObject(i);
                }
            } else if (obj.mesh.position.z > 15) {
                removeObject(i);
            }
        }
        
        updateUI();
    }

    function removeObject(index) {
        scene.remove(worldObjects[index].mesh);
        worldObjects.splice(index, 1);
    }

    function gameOver() {
        gameActive = false;
        stopMusic();
        playBeep(200, 'sawtooth', 1);
        playPlayerAnimation('die'); // Try to play death animation
        document.getElementById('menu').style.display = 'flex';
        document.querySelector('#menu h1').innerText = "Busted!";
        document.querySelector('#menu p').innerHTML = `Final Score: ${score}<br>Coins: ${coinCount}`;
        document.getElementById('startBtn').innerText = "Play Again";
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('coins').innerText = coinCount;
        let status = "";
        if (flyMode) status += "HOVERBOARD ACTIVE! ";
        if (jumpBoostTimer > 0) status += "JUMP BOOST! ";
        document.getElementById('powerup-status').innerText = status;
    }

    function onKeyDown(event) {
        if (!gameActive) return;
        if ((event.code === 'ArrowLeft' || event.code === 'KeyA') && currentLane > -1) {
            currentLane--; targetX = currentLane * laneWidth;
        } else if ((event.code === 'ArrowRight' || event.code === 'KeyD') && currentLane < 1) {
            currentLane++; targetX = currentLane * laneWidth;
        } else if (event.code === 'Space') {
            if (!isJumping && !flyMode) {
                velocityY = jumpStrength;
                isJumping = true;
                playBeep(400, 'sine', 0.1);
                playPlayerAnimation('jump'); // Trigger jump animation
            }
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        // Update 3D skeleton animations
        animationMixers.forEach(mixer => mixer.update(delta));

        if (gameActive) {
            updatePhysics();
            updateWorld();
        }
        renderer.render(scene, camera);
    }

    // --- AUDIO ---
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startMusic();
    }

    function playBeep(freq, type, duration = 0.1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function startMusic() {
        stopMusic();
        let step = 0;
        musicInterval = setInterval(() => {
            if (!gameActive) return;
            if (step % 4 === 0) playBeep(60, 'sine', 0.2);
            else if (step % 4 === 2) playBeep(120, 'triangle', 0.1);
            step++;
        }, 200);
    }

    function stopMusic() { if (musicInterval) clearInterval(musicInterval); }

    init();
</script>
</body>
</html>
